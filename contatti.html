<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contatti - Associazione Alma Tellus</title>
  <meta name="description" content="Modulo contatti dell'Associazione Alma Tellus.">
  <link rel="stylesheet" href="style.css?v=125">
  <script src="config.js?v=125"></script>
  <style>
    /* Override di sicurezza: logo pagina contatti non deve mai sforare */
    .contact-page .form-logo {
      width: 112px !important;
      max-width: 38vw !important;
      height: auto !important;
      display: block !important;
      margin: 0 0 16px 0 !important;
      object-fit: contain !important;
    }

    @media (max-width: 680px) {
      .contact-page .form-logo {
        width: 86px !important;
        max-width: 32vw !important;
        margin-bottom: 12px !important;
      }
    }
  </style>
</head>
<body class="contact-page">
  <header class="site-header">
    <a class="brand-mini" href="index.html" aria-label="Alma Tellus - Home">
      <img src="logo.png" alt="Alma Tellus">
    </a>

    <button class="menu-toggle" type="button" aria-label="Apri menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="site-nav" aria-label="Menu principale">
      <a href="index.html">Home</a>
      <a href="soci.html">Richiesta socio</a>
      <a href="contatti.html">Contatti</a>
      <a href="associazione.html">Dati associazione</a>
    </nav>
  </header>

  <main class="form-main">
    <section class="form-card" aria-labelledby="contact-title">
      <div class="form-heading">
        <img class="form-logo" src="logo.png" alt="Alma Tellus">
        <p class="eyebrow">Contatti</p>
        <h1 id="contact-title">Scrivi ad Alma Tellus</h1>
        <p class="intro">
          Usa il modulo per inviare una comunicazione all’associazione. Il messaggio verrà registrato e inoltrato ai referenti interni.
        </p>
      </div>

      <form id="contactForm" class="socio-form" method="POST" target="contactFrame" novalidate>
        <input type="hidden" name="form_type" value="contatti">
        <input type="hidden" name="source_page" value="contatti.html">
        <input type="hidden" name="page_version" value="v.1.25">
        <input type="hidden" name="submitted_at_client" id="submittedAtClient" value="">

        <label class="hp-field" aria-hidden="true">
          Non compilare questo campo
          <input type="text" name="website" tabindex="-1" autocomplete="off">
        </label>

        <div class="field-grid">
          <label>
            Nome e cognome *
            <input type="text" name="nome" autocomplete="name" required>
          </label>

          <label>
            Email *
            <input type="email" name="email" autocomplete="email" required>
          </label>
        </div>

        <label>
          Oggetto *
          <input type="text" name="oggetto" required>
        </label>

        <label>
          Messaggio *
          <textarea name="messaggio" rows="7" required></textarea>
        </label>

        <div class="checks">
          <label class="check-line">
            <input type="checkbox" name="privacy" value="Sì" required>
            <span>Dichiaro di aver preso visione delle informazioni relative al trattamento dei dati e autorizzo l’utilizzo dei dati inseriti per ricevere risposta alla mia richiesta.</span>
          </label>
        </div>

        <button id="submitButton" class="btn btn-primary btn-submit" type="submit">
          Invia messaggio
        </button>

        <p id="formStatus" class="form-status" role="status" aria-live="polite"></p>
      </form>

      <iframe id="contactFrame" name="contactFrame" title="Invio contatto" style="display:none;width:0;height:0;border:0;"></iframe>
    </section>
  </main>

  <footer class="site-footer">
    <div>
      <strong>Associazione Alma Tellus</strong><br>
      Associazione senza scopo di lucro<br>
      Codice fiscale: 92069430673
    </div>
  </footer>

  <script>
    (function () {
      "use strict";

      const PAGE_VERSION = "v.1.25";
      const FALLBACK_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzFTVceOvTU8pccpRC-6jXYARFFQvp-HGcPo5jX2VsBCod8490_oR99JZvn-rIKCeWvpQ/exec";

      const menuButton = document.querySelector(".menu-toggle");
      const nav = document.querySelector(".site-nav");

      if (menuButton && nav) {
        menuButton.addEventListener("click", function () {
          const isOpen = nav.classList.toggle("is-open");
          menuButton.setAttribute("aria-expanded", String(isOpen));
        });
      }

      const form = document.getElementById("contactForm");
      const frame = document.getElementById("contactFrame");
      const statusBox = document.getElementById("formStatus");
      const submitButton = document.getElementById("submitButton");
      const submittedAtClient = document.getElementById("submittedAtClient");

      const configuredUrl = window.ALMA_TELLUS_CONFIG && window.ALMA_TELLUS_CONFIG.WEB_APP_URL
        ? String(window.ALMA_TELLUS_CONFIG.WEB_APP_URL).trim()
        : "";

      const webAppUrl = configuredUrl || FALLBACK_WEB_APP_URL;

      if (form) {
        form.action = webAppUrl;
      }

      let submitted = false;
      let completed = false;
      let timeoutId = null;

      function setStatus(message, isError) {
        if (!statusBox) return;
        statusBox.textContent = message;
        statusBox.classList.toggle("is-error", Boolean(isError));
      }

      function isValidEmail(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(String(value || "").trim());
      }

      function resetButton(text) {
        if (!submitButton) return;
        submitButton.disabled = false;
        submitButton.textContent = text || "Invia messaggio";
      }

      if (frame) {
        frame.addEventListener("load", function () {
          if (!submitted || completed) return;

          completed = true;
          window.clearTimeout(timeoutId);

          setStatus("Messaggio inviato correttamente. Grazie, ti risponderemo appena possibile.", false);
          resetButton("Invia un altro messaggio");

          if (form) {
            form.reset();
          }
        });
      }

      if (form) {
        form.addEventListener("submit", function (event) {
          const nome = form.elements["nome"] ? form.elements["nome"].value.trim() : "";
          const email = form.elements["email"] ? form.elements["email"].value.trim() : "";
          const oggetto = form.elements["oggetto"] ? form.elements["oggetto"].value.trim() : "";
          const messaggio = form.elements["messaggio"] ? form.elements["messaggio"].value.trim() : "";
          const privacy = form.elements["privacy"] ? form.elements["privacy"].checked : false;
          const honeypot = form.elements["website"] ? form.elements["website"].value.trim() : "";

          if (honeypot) {
            event.preventDefault();
            setStatus("Messaggio inviato correttamente. Grazie.", false);
            form.reset();
            return;
          }

          if (!nome || !email || !oggetto || !messaggio || !privacy) {
            event.preventDefault();
            setStatus("Compila tutti i campi obbligatori e conferma la presa visione privacy.", true);
            return;
          }

          if (!isValidEmail(email)) {
            event.preventDefault();
            setStatus("Inserisci un indirizzo email valido.", true);
            return;
          }

          if (messaggio.length < 10) {
            event.preventDefault();
            setStatus("Il messaggio è troppo breve.", true);
            return;
          }

          if (!webAppUrl) {
            event.preventDefault();
            setStatus("Modulo momentaneamente non disponibile. Riprova più tardi.", true);
            return;
          }

          if (submittedAtClient) {
            submittedAtClient.value = new Date().toISOString();
          }

          submitted = true;
          completed = false;

          setStatus("Invio in corso...", false);

          if (submitButton) {
            submitButton.disabled = true;
            submitButton.textContent = "Invio in corso...";
          }

          timeoutId = window.setTimeout(function () {
            if (completed) return;

            setStatus("Non è stato possibile confermare l’invio. Riprova tra qualche minuto.", true);
            resetButton("Riprova invio");
          }, 15000);
        });
      }

      window.ALMA_TELLUS_CONTACT_PAGE_VERSION = PAGE_VERSION;
    })();
  </script>
</body>
</html>
