<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associazione Alma Tellus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="home-page">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Associazione Alma Tellus">
      <img src="logo.png" alt="Logo Associazione Alma Tellus" class="brand-logo" />
    </a>

    <button class="menu-button" type="button" aria-label="Apri menu" aria-expanded="false" data-menu-button>
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="main-menu" data-menu>
      <a href="index.html" aria-current="page">Home</a>
      <a href="soci.html">Richiesta socio</a>
      <a href="mailto:info@almatellus.it">Contatti</a>
    </nav>
  </header>

  <main class="home-main">
    <section class="hero-clean" aria-labelledby="home-title">
      <img src="logo.png" alt="Associazione Alma Tellus" class="hero-logo" />
      <h1 id="home-title" class="coming-soon">Coming soon</h1>

      <a class="home-action" href="soci.html">
        Richiesta di ammissione a socio
      </a>
    </section>
  </main>

  <script>
    const button = document.querySelector('[data-menu-button]');
    const menu = document.querySelector('[data-menu]');

    button.addEventListener('click', () => {
      const isOpen = menu.classList.toggle('is-open');
      button.setAttribute('aria-expanded', String(isOpen));
    });
  </script>
</body>
</html>
