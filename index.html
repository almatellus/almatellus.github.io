<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alma Tellus</title>
  <style>
    :root {
      --blu-petrolio: #0e2a3a;
      --oro-sabbia: #c8a15a;
      --sfondo: #f6f3ec;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--sfondo);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--blu-petrolio);
    }

    main {
      text-align: center;
      padding: 32px;
    }

    .logo {
      width: min(520px, 82vw);
      height: auto;
      display: block;
      margin: 0 auto 36px auto;
    }

    .coming-soon {
      font-size: clamp(1.4rem, 3vw, 2.4rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--blu-petrolio);
    }

    .linea {
      width: 72px;
      height: 3px;
      background: var(--oro-sabbia);
      margin: 18px auto 0 auto;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="logo.png" alt="Logo Alma Tellus" />
    <div class="coming-soon">Coming soon</div>
    <div class="linea"></div>
  </main>
</body>
</html>
