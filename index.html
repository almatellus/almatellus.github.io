<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alma Tellus Logo Preview</title>
  <style>
    :root {
      --bg: #f4efe6;
      --text: #0e2a3a;
      --panel: rgba(255, 255, 255, 0.72);
      --border: rgba(14, 42, 58, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
      transition: background 0.35s ease, color 0.35s ease;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .page {
      width: min(1100px, 100%);
      text-align: center;
    }

    .card {
      width: 100%;
      padding: clamp(24px, 5vw, 56px);
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.12);
    }

    .logo {
      display: block;
      width: min(900px, 100%);
      height: auto;
      margin: 0 auto;
      filter: drop-shadow(0 18px 26px rgba(0, 0, 0, 0.18));
      user-select: none;
      -webkit-user-drag: none;
    }

    .title {
      margin: 28px 0 8px;
      font-size: clamp(28px, 5vw, 56px);
      letter-spacing: 0.18em;
      font-weight: 700;
    }

    .hint {
      margin: 0;
      font-size: clamp(14px, 2vw, 18px);
      opacity: 0.78;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.92);
    }

    .counter {
      position: fixed;
      right: 18px;
      bottom: 18px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--border);
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-label="Anteprima logo Alma Tellus">
      <img class="logo" src="logo.png" alt="Logo Alma Tellus" />
      <h1 class="title">ALMA TELLUS</h1>
      <p class="hint">Premi la barra spaziatrice per cambiare sfondo.</p>
      <div class="controls">
        <button type="button" id="changeBackground">Cambia sfondo</button>
        <button type="button" id="resetBackground">Sfondo iniziale</button>
      </div>
    </section>
  </main>

  <div class="counter" id="counter">Sfondo 1</div>

  <script>
    const backgrounds = [
      {
        name: "Avorio",
        bg: "linear-gradient(135deg, #f6f1e8 0%, #fffaf2 100%)",
        text: "#0e2a3a",
        panel: "rgba(255, 255, 255, 0.72)",
        border: "rgba(14, 42, 58, 0.16)"
      },
      {
        name: "Blu petrolio",
        bg: "radial-gradient(circle at 50% 30%, #16384a 0%, #071924 58%, #031016 100%)",
        text: "#f6f1e8",
        panel: "rgba(255, 255, 255, 0.08)",
        border: "rgba(255, 255, 255, 0.22)"
      },
      {
        name: "Oro sabbia",
        bg: "linear-gradient(135deg, #c8a15a 0%, #efe0bd 46%, #fff7e6 100%)",
        text: "#0e2a3a",
        panel: "rgba(255, 255, 255, 0.58)",
        border: "rgba(14, 42, 58, 0.18)"
      },
      {
        name: "Grigio tecnico",
        bg: "linear-gradient(135deg, #d9dde0 0%, #f6f7f7 48%, #b8c0c5 100%)",
        text: "#0e2a3a",
        panel: "rgba(255, 255, 255, 0.62)",
        border: "rgba(14, 42, 58, 0.16)"
      },
      {
        name: "Nero elegante",
        bg: "linear-gradient(135deg, #050505 0%, #151515 55%, #2b2415 100%)",
        text: "#f6f1e8",
        panel: "rgba(255, 255, 255, 0.08)",
        border: "rgba(255, 255, 255, 0.18)"
      },
      {
        name: "Verde naturale",
        bg: "linear-gradient(135deg, #edf5e8 0%, #b9d5bc 48%, #3c5948 100%)",
        text: "#0e2a3a",
        panel: "rgba(255, 255, 255, 0.62)",
        border: "rgba(14, 42, 58, 0.18)"
      }
    ];

    let currentIndex = 0;

    const counter = document.getElementById("counter");
    const changeButton = document.getElementById("changeBackground");
    const resetButton = document.getElementById("resetBackground");

    function applyBackground(index) {
      const selected = backgrounds[index];
      document.documentElement.style.setProperty("--bg", selected.bg);
      document.documentElement.style.setProperty("--text", selected.text);
      document.documentElement.style.setProperty("--panel", selected.panel);
      document.documentElement.style.setProperty("--border", selected.border);
      counter.textContent = `Sfondo ${index + 1}: ${selected.name}`;
    }

    function nextBackground() {
      currentIndex = (currentIndex + 1) % backgrounds.length;
      applyBackground(currentIndex);
    }

    function resetBackground() {
      currentIndex = 0;
      applyBackground(currentIndex);
    }

    document.addEventListener("keydown", function (event) {
      if (event.code === "Space") {
        event.preventDefault();
        nextBackground();
      }
    });

    changeButton.addEventListener("click", nextBackground);
    resetButton.addEventListener("click", resetBackground);

    applyBackground(currentIndex);
  </script>
</body>
</html>
