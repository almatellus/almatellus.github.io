<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associazione Alma Tellus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-home">
  <header class="site-header">
    <a class="brand-mini" href="index.html" aria-label="Home Alma Tellus">
      <img src="logo.png" alt="Alma Tellus" />
    </a>

    <button class="menu-toggle" type="button" aria-label="Apri menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="site-nav" aria-label="Menu principale">
      <a href="index.html">Home</a>
      <a href="soci.html">Richiesta socio</a>
      <a href="mailto:info@almatellus.it">Contatti</a>
    </nav>
  </header>

  <main class="home-main">
    <section class="home-hero" aria-label="Alma Tellus">
      <img class="home-logo" src="logo.png" alt="Associazione Alma Tellus" />
      <p class="coming-soon">Coming soon</p>
      <a class="btn btn-primary" href="soci.html">Richiesta di ammissione a socio</a>
    </section>
  </main>

  <script>
    const toggle = document.querySelector('.menu-toggle');
    const nav = document.querySelector('.site-nav');
    toggle.addEventListener('click', () => {
      const open = nav.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', String(open));
    });
  </script>
</body>
</html>
